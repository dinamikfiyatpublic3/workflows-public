name: concurrent_run_api_matrix_ub

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubicloud-standard-2
    timeout-minutes: 120

    env:
      CI: true
      TZ: Europe/Istanbul
      LANG: tr_TR.UTF-8
      LC_ALL: tr_TR.UTF-8
      LANGUAGE: tr_TR:tr

      # 🔥 CRITICAL
      CHROME_EXECUTABLE_PATH: /usr/bin/google-chrome

      PG_CONNECTION_STRING_BASE: ${{ secrets.PG_CONNECTION_STRING_BASE }}
      PG_SUPABASEURL: ${{ secrets.PG_SUPABASEURL }}
      PG_SUPABASEKEY: ${{ secrets.PG_SUPABASEKEY }}
      PG_PROXYPORT: ${{ secrets.PG_PROXYPORT }}
      PG_PROXYUSERNAME: ${{ secrets.PG_PROXYUSERNAME }}
      PG_PROXYPASSWORD: ${{ secrets.PG_PROXYPASSWORD }}
      PROXY_IP: ${{ secrets.PROXY_IP }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_PASS: ${{ secrets.PROXY_PASS }}
      PG_SCRPEANT: ${{ secrets.PG_SCRPEANT }}
      PG_DB_USER: ${{ secrets.PG_DB_USER }}
      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      PG_HOST: ${{ secrets.PG_HOST }}
      PG_PORT: ${{ secrets.PG_PORT }}
      PG_NAME: ${{ secrets.PG_NAME }}
      PG_VIEW_NAME: ${{ secrets.PG_VIEW_NAME }}
      PG_PROXYRACK_USERNAME: ${{ secrets.PG_PROXYRACK_USERNAME }}
      PG_PROXYRACK_PASSWORD: ${{ secrets.PG_PROXYRACK_PASSWORD }}
      MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      NODE_OPTIONS: --unhandled-rejections=strict

    strategy:
      matrix:
        script: [
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_1.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_2.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_3.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_4.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_5.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_6.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_7.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_8.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_9.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_10.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_11.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_12.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_13.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_14.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_15.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_16.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_17.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_18.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_19.mjs",
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_20.mjs"
        ]

    steps:
      # 🔄 Repo çek/güncelle
      - name: Get/Update private code
        run: |
          if [ -d "/opt/anlik_guncel" ]; then
            cd /opt/anlik_guncel
            git pull https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git main || {
              cd /opt
              rm -rf anlik_guncel
              git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git /opt/anlik_guncel
            }
          else
            git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git /opt/anlik_guncel
          fi

      # 🟢 Node
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 🧱 System deps
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            locales tzdata \
            libnss3 libxss1 libasound2t64 fonts-liberation \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libgbm1 libnspr4 \
            libxcomposite1 libxrandr2 libxdamage1 libxfixes3 \
            libpango-1.0-0 libpangocairo-1.0-0 libgtk-3-0

          sudo locale-gen tr_TR.UTF-8
          sudo update-locale LANG=tr_TR.UTF-8 LC_ALL=tr_TR.UTF-8 LANGUAGE=tr_TR:tr
          sudo timedatectl set-timezone Europe/Istanbul

      # 🔥 Chrome (STABLE)
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 🧹 tmp cleanup
      - name: Cleanup temp
        run: |
          sudo rm -rf /tmp/puppeteer_*

      # 📦 Dependencies
      - name: Install dependencies
        working-directory: /opt/anlik_guncel
        run: |
          npm ci --prefer-offline || npm install

      # 🔥 Puppeteer deps
      - name: Ensure puppeteer deps
        working-directory: /opt/anlik_guncel
        run: |
          npm install \
            rebrowser-puppeteer-core@latest \
            puppeteer-extra \
            puppeteer-extra-plugin-stealth \
            puppeteer-extra-plugin-anonymize-ua

      # 🧪 Install Xvfb
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      # 🔍 Debug
      - name: Debug installed modules
        working-directory: /opt/anlik_guncel
        run: |
          echo "Node version:"
          node -v
          echo "Check rebrowser:"
          ls -la node_modules | grep rebrowser || echo "rebrowser NOT FOUND"

      # 🚀 Run scraper (HEADFUL + Xvfb)
      - name: Run scraper
        working-directory: /opt/anlik_guncel
        run: |
          echo "▶️ Running: ${{ matrix.script }}"
          xvfb-run -a -s "-screen 0 1920x1080x24" node "./${{ matrix.script }}"
