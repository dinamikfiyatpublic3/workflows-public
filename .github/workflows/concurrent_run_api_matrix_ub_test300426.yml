name: concurrent_run_api_matrix_ub_test300426

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubicloud-standard-2
    timeout-minutes: 120

    env:
      CI: true
      TZ: Europe/Istanbul
      LANG: tr_TR.UTF-8
      LC_ALL: tr_TR.UTF-8
      LANGUAGE: tr_TR:tr

      # 🔥 CRITICAL
      CHROME_EXECUTABLE_PATH: /usr/bin/google-chrome

      PG_CONNECTION_STRING_BASE: ${{ secrets.PG_CONNECTION_STRING_BASE }}
      PG_SUPABASEURL: ${{ secrets.PG_SUPABASEURL }}
      PG_SUPABASEKEY: ${{ secrets.PG_SUPABASEKEY }}

      PROXY_IP: ${{ secrets.PROXY_IP }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_PASS: ${{ secrets.PROXY_PASS }}

      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      PG_HOST: ${{ secrets.PG_HOST }}
      PG_PORT: ${{ secrets.PG_PORT }}
      PG_NAME: ${{ secrets.PG_NAME }}
      PG_VIEW_NAME: ${{ secrets.PG_VIEW_NAME }}

      MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      NODE_OPTIONS: --unhandled-rejections=strict

    strategy:
      matrix:
        script: [
          "tests/rakipler_parcalar/scrape_api_urunlerim_rakipler_parca_1_test300426.mjs"
        ]

    steps:
      # 🔄 Repo çek/güncelle
      - name: Get/Update private code
        run: |
          if [ -d "/opt/anlik_guncel" ]; then
            cd /opt/anlik_guncel
            git pull https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git main || {
              cd /opt
              rm -rf anlik_guncel
              git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git /opt/anlik_guncel
            }
          else
            git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git /opt/anlik_guncel
          fi

      # 🟢 Node
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 🧱 System deps + locale
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            locales tzdata \
            libnss3 libxss1 libasound2t64 fonts-liberation \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libgbm1 libnspr4 \
            libxcomposite1 libxrandr2 libxdamage1 libxfixes3 \
            libpango-1.0-0 libpangocairo-1.0-0 libgtk-3-0

          sudo locale-gen tr_TR.UTF-8
          sudo update-locale LANG=tr_TR.UTF-8 LC_ALL=tr_TR.UTF-8 LANGUAGE=tr_TR:tr
          sudo timedatectl set-timezone Europe/Istanbul

      # 🔥 Chrome (STABLE)
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 🧹 tmp cleanup (çok önemli)
      - name: Cleanup temp
        run: |
          sudo rm -rf /tmp/puppeteer_*

      # 📦 Dependencies
      - name: Install dependencies
        working-directory: /opt/anlik_guncel
        run: npm ci --prefer-offline || npm install

      # 🚀 Run
      - name: Run scraper
        working-directory: /opt/anlik_guncel
        run: |
          echo "▶️ Running: ${{ matrix.script }}"
          node "./${{ matrix.script }}"
