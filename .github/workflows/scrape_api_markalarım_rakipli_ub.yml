name: scrape_api_markalarım_rakipli_ub

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubicloud-standard-2
    timeout-minutes: 180

    env:
      PG_CONNECTION_STRING_BASE: ${{ secrets.PG_CONNECTION_STRING_BASE }}
      PG_SUPABASEURL: ${{ secrets.PG_SUPABASEURL }}
      PG_SUPABASEKEY: ${{ secrets.PG_SUPABASEKEY }}
      PG_PROXYPORT: ${{ secrets.PG_PROXYPORT }}
      PG_PROXYUSERNAME: ${{ secrets.PG_PROXYUSERNAME }}
      PG_PROXYPASSWORD: ${{ secrets.PG_PROXYPASSWORD }}
      PROXY_IP: ${{ secrets.PROXY_IP }}
      PROXY_PORT: ${{ secrets.PROXY_PORT }}
      PROXY_USER: ${{ secrets.PROXY_USER }}
      PROXY_PASS: ${{ secrets.PROXY_PASS }}
      PG_SCRPEANT: ${{ secrets.PG_SCRPEANT }}
      PG_DB_USER: ${{ secrets.PG_DB_USER }}
      PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
      PG_HOST: ${{ secrets.PG_HOST }}
      PG_PORT: ${{ secrets.PG_PORT }}
      PG_NAME: ${{ secrets.PG_NAME }}
      PG_VIEW_NAME: ${{ secrets.PG_VIEW_NAME }}
      PG_PROXYRACK_USERNAME: ${{ secrets.PG_PROXYRACK_USERNAME }}
      PG_PROXYRACK_PASSWORD: ${{ secrets.PG_PROXYRACK_PASSWORD }}
      MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }} 
      NODE_OPTIONS: --unhandled-rejections=strict

    strategy:
      matrix:
        script: [ 
          "tests/scrape_api_markalarım_rakipli1_d1.mjs",
          "tests/scrape_api_markalarım_rakipli1_d2.mjs",
          "tests/scrape_api_markalarım_rakipli1_d3.mjs",
          "tests/scrape_api_markalarım_rakipli1_d4.mjs",
          "tests/scrape_api_markalarım_rakipli1_d5.mjs",
          "tests/scrape_api_markalarım_rakipli1_d6.mjs",
          "tests/scrape_api_markalarım_rakipli1_d7.mjs",
          "tests/scrape_api_markalarım_rakipli1_d8.mjs",
          "tests/scrape_api_markalarım_rakipli1_d9.mjs",
          "tests/scrape_api_markalarım_rakipli1_d10.mjs",
          "tests/scrape_api_markalarım_rakipli1_d11.mjs",
          "tests/scrape_api_markalarım_rakipli1_d12.mjs",
          "tests/scrape_api_markalarım_rakipli1_d13.mjs",
          "tests/scrape_api_markalarım_rakipli1_d14.mjs",
          "tests/scrape_api_markalarım_rakipli1_d15.mjs",
          "tests/scrape_api_markalarım_rakipli1_d16.mjs",
          "tests/scrape_api_markalarım_rakipli1_d17.mjs",
          "tests/scrape_api_markalarım_rakipli1_d18.mjs",
          "tests/scrape_api_markalarım_rakipli1_d19.mjs",
          "tests/scrape_api_markalarım_rakipli1_d20.mjs",
          "tests/scrape_api_markalarım_rakipli1_d21.mjs",
          "tests/scrape_api_markalarım_rakipli1_d22.mjs",
          "tests/scrape_api_markalarım_rakipli1_d23.mjs",
          "tests/scrape_api_markalarım_rakipli1_d24.mjs",
          "tests/scrape_api_markalarım_rakipli1_d25.mjs"
        ]

    steps:
      # Private repo'dan kod çek/güncelle
      - name: Get/Update private code
        run: |
          if [ -d "/opt/anlik_guncel" ]; then
            cd /opt/anlik_guncel
            git pull https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git main || {
              cd /opt
              rm -rf anlik_guncel
              git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git
            }
          else
            git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/dinamikfiyatpublic3/anlik_guncel.git /opt/anlik_guncel
          fi

      # Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Dependencies
      - name: Install dependencies
        working-directory: /opt/anlik_guncel
        run: npm ci --prefer-offline || npm install

      # Chrome
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      # Script çalıştır
      - name: Run scraper
        working-directory: /opt/anlik_guncel
        run: |
          echo "Running scraper: ${{ matrix.script }}"
          node "./${{ matrix.script }}"
